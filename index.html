<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSA - No Skaters Allowed</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #E11D3F; /* Crimson background */
        }
        header {
            background-color: #000000; /* Black header */
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #FFFFFF; /* White text */
        }
        nav {
            display: flex;
        }
        nav a {
            color: #FFFFFF; /* White text */
            text-decoration: none;
            padding: 10px 20px;
            margin-left: 5px;
            border-radius: 5px 5px 0 0;
            transition: background-color 0.3s;
        }
        nav a:hover, nav a.active {
            background-color: #E11D3F; /* Crimson background on hover */
        }
        .content {
            padding: 20px;
            color: #FFFFFF; /* White text */
            text-align: center;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .cta-button {
            background-color: #FFFFFF; /* White button */
            border: none;
            color: #E11D3F; /* Crimson text */
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">NSA</div>
        <nav>
            <a href="#home" class="active">Home</a>
            <a href="#about">About</a>
            <a href="#rules">Rules</a>
            <a href="#events">Events</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <div class="content">
        <h1>NO SKATERS ALLOWED</h1>
        <p>Welcome to the official NSA website. We're dedicated to maintaining skater-free zones.</p>
        <a href="#join" class="cta-button">Join NSA</a>
    </div>
</body>
</html>
