<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 10px; }
        #tabs { display: flex; }
        #tabs button { margin-right: 10px; padding: 10px; }
        .tab-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <h1>Mission Tracker</h1>

    <div id="tabs">
        <button onclick="showTab('missionsTab')">Missions</button>
        <button onclick="showTab('dogScheduleTab')">Dog Walking Schedule</button>
        <button onclick="showTab('chefRideTab')">Chef Ride to Work</button>
    </div>

    <!-- Missions Tab -->
    <div id="missionsTab" class="tab-content">
        <h2>Add a New Mission</h2>
        <input type="text" id="missionDescription" placeholder="Mission description">
        <input type="text" id="personSelector" placeholder="Assigned to">
        <input type="date" id="missionDate">
        <input type="time" id="missionTime">
        <button onclick="addMission()">Add Mission</button>
        <h2>Active Missions</h2>
        <ul id="missionsList"></ul>
    </div>

    <!-- Dog Walking Schedule Tab -->
    <div id="dogScheduleTab" class="tab-content">
        <h2>Dog Walking Schedule</h2>
        <input type="text" id="dogWalkerSelector" placeholder="Walker Name">
        <input type="date" id="walkDate">
        <input type="time" id="walkTime">
        <button onclick="assignDogWalker()">Assign Dog Walker</button>
        <h2>Scheduled Walkers</h2>
        <ul id="dogWalkingList"></ul>
    </div>

    <!-- Chef Ride to Work Tab -->
    <div id="chefRideTab" class="tab-content">
        <h2>Chef Ride to Work Schedule</h2>
        <input type="text" id="ridePersonSelector" placeholder="Person Name">
        <input type="date" id="rideDate">
        <input type="time" id="rideTime">
        <button onclick="assignRide()">Assign Ride</button>
        <h2>Scheduled Rides</h2>
        <ul id="chefRideList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
